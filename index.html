<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#060a13;--bg2:#0d1321;--card:rgba(15,23,42,.85);--border:#1e293b;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--on:#10b981;--on-bg:rgba(16,185,129,.08);--gn:#f59e0b;--gn-bg:rgba(245,158,11,.08);--off:#ef4444;--off-bg:rgba(239,68,68,.08);--ac:#06b6d4;--ac-g:rgba(6,182,212,.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;color:var(--t1);background:var(--bg);min-height:100vh;overflow-x:hidden}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(6,182,212,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.04) 1px,transparent 1px);background-size:50px 50px;animation:gd 30s linear infinite}
@keyframes gd{to{transform:translate(50px,50px)}}
.glow-blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.glow-blob.a{width:400px;height:400px;background:rgba(6,182,212,.06);top:-100px;left:-100px}
.glow-blob.b{width:350px;height:350px;background:rgba(16,185,129,.05);bottom:-80px;right:-80px}
.scan-line{position:fixed;left:0;right:0;height:1px;z-index:999;pointer-events:none;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.25;animation:sd 6s ease-in-out infinite}
@keyframes sd{0%{top:-2px;opacity:0}10%{opacity:.25}90%{opacity:.25}100%{top:100vh;opacity:0}}

/* Visual alarm flash */
.alarm-flash{position:fixed;inset:0;z-index:1999;pointer-events:none;opacity:0}
.alarm-flash.red{background:rgba(239,68,68,.15);animation:afRed 1.5s ease forwards}
.alarm-flash.amber{background:rgba(245,158,11,.1);animation:afAmb 1s ease forwards}
.alarm-flash.green{background:rgba(16,185,129,.08);animation:afGrn .8s ease forwards}
@keyframes afRed{0%{opacity:1}30%{opacity:.6}60%{opacity:.8}100%{opacity:0}}
@keyframes afAmb{0%{opacity:1}50%{opacity:.5}100%{opacity:0}}
@keyframes afGrn{0%{opacity:1}100%{opacity:0}}

header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;padding:16px 24px;background:rgba(13,19,33,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:border-color .3s}
header.alarm-border{border-bottom-color:var(--off)!important;box-shadow:0 4px 30px rgba(239,68,68,.2)}
header.warn-border{border-bottom-color:var(--gn)!important;box-shadow:0 4px 30px rgba(245,158,11,.15)}
header.ok-border{border-bottom-color:var(--on)!important;box-shadow:0 4px 30px rgba(16,185,129,.12)}
.h-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:9px}
.logo i{color:var(--ac);font-size:20px}
.logo h1{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;letter-spacing:2px}
.live-badge{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,.12);color:#ef4444;letter-spacing:1px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:lp 1.5s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{opacity:.4;box-shadow:0 0 0 5px rgba(239,68,68,0)}}
.h-center{text-align:center}
#clock{font-family:'Orbitron',monospace;font-size:17px;letter-spacing:1px}
#dateText{font-size:11px;color:var(--t3);margin-top:2px}
.h-right{display:flex;align-items:center;gap:12px}
.health-wrap{display:flex;align-items:center;gap:8px}
.health-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.audio-ctrl{display:flex;align-items:center;gap:8px}
.btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s}
.btn-icon:hover{border-color:var(--ac);color:var(--ac);background:rgba(6,182,212,.08)}
.vol-wrap{display:flex;align-items:center;gap:5px}
.vol-wrap span{font-size:10px;color:var(--t3);min-width:26px}
input[type=range]{-webkit-appearance:none;width:80px;height:4px;background:var(--border);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ac);cursor:pointer}

.stats-bar{position:relative;z-index:10;display:flex;padding:0 24px;background:rgba(13,19,33,.6);border-bottom:1px solid var(--border);overflow-x:auto}
.stat-item{flex:1;min-width:120px;padding:14px 16px;text-align:center;border-right:1px solid var(--border);transition:.2s}
.stat-item:last-child{border-right:none}
.stat-item:hover{background:rgba(255,255,255,.02)}
.stat-num{font-family:'Orbitron',monospace;font-size:26px;font-weight:900}
.stat-num.c-on{color:var(--on)}.stat-num.c-gn{color:var(--gn)}.stat-num.c-off{color:var(--off)}.stat-num.c-ac{color:var(--ac)}
.stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.stat-num.pop{animation:np .35s ease}
@keyframes np{50%{transform:scale(1.15)}}

.toolbar{position:relative;z-index:10;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 24px;background:rgba(13,19,33,.4)}
.search-box{position:relative;flex:0 0 220px}
.search-box i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:.2s}
.search-box input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
.search-box input::placeholder{color:var(--t3)}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:.2s}
.pill:hover{border-color:var(--ac);color:var(--ac)}
.pill.a{background:var(--ac);color:#000;border-color:var(--ac)}
.pill.a-gn{background:var(--gn);color:#000;border-color:var(--gn)}
.pill.a-off{background:var(--off);color:#fff;border-color:var(--off)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.sort-sel{padding:6px 10px;border-radius:8px;font-size:11px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}

/* Tombol aktifasi audio di toolbar */
.audio-activate{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--ac);background:rgba(6,182,212,.1);color:var(--ac);cursor:pointer;transition:.3s;font-family:'Outfit',sans-serif;white-space:nowrap}
.audio-activate:hover{background:var(--ac);color:#000;box-shadow:0 4px 20px var(--ac-g)}
.audio-activate.active{border-color:var(--on);background:var(--on-bg);color:var(--on)}
.audio-activate.active:hover{background:var(--on);color:#000}
.audio-activate i{font-size:13px}

main{position:relative;z-index:10;padding:18px 24px 90px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}

.card{position:relative;border-radius:14px;padding:18px;background:var(--card);border:1px solid var(--border);backdrop-filter:blur(8px);transition:transform .3s,box-shadow .3s,border-color .3s;overflow:hidden}
.card:hover{transform:translateY(-3px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);transition:.3s}
.card.s-on{border-color:rgba(16,185,129,.3)}.card.s-on:hover{box-shadow:0 8px 35px rgba(16,185,129,.12)}.card.s-on::before{background:var(--on)}
.card.s-gn{border-color:rgba(245,158,11,.3)}.card.s-gn:hover{box-shadow:0 8px 35px rgba(245,158,11,.12)}.card.s-gn::before{background:var(--gn)}
.card.s-off{border-color:rgba(239,68,68,.3)}.card.s-off:hover{box-shadow:0 8px 35px rgba(239,68,68,.12)}.card.s-off::before{background:var(--off)}
.card.flash-on{animation:fon .7s ease}.card.flash-gn{animation:fgn .7s ease}.card.flash-off{animation:foff .7s ease}
@keyframes fon{0%{background:rgba(16,185,129,.35)}100%{background:var(--card)}}
@keyframes fgn{0%{background:rgba(245,158,11,.35)}100%{background:var(--card)}}
@keyframes foff{0%{background:rgba(239,68,68,.35)}100%{background:var(--card)}}
.card.hidden-card{display:none}

.c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.c-name{font-weight:700;font-size:16px;letter-spacing:.5px}
.c-cat{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.c-status{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-dot.on{background:var(--on);box-shadow:0 0 8px rgba(16,185,129,.35);animation:dp 2s ease infinite}
.s-dot.gn{background:var(--gn);box-shadow:0 0 8px rgba(245,158,11,.35);animation:dp 1s ease infinite}
.s-dot.off{background:var(--off);box-shadow:0 0 8px rgba(239,68,68,.35);animation:dp .7s ease infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.35}}
.s-txt{font-weight:700;font-size:14px;letter-spacing:1px}
.s-txt.on{color:var(--on)}.s-txt.gn{color:var(--gn)}.s-txt.off{color:var(--off)}

.c-body{display:flex;align-items:center;gap:14px}
.cd-ring{flex-shrink:0;position:relative}
.cd-ring svg{display:block}
.cd-ring .rt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--t1)}
.c-info{flex:1;min-width:0}
.c-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);margin-bottom:5px}
.c-row i{width:13px;text-align:center;color:var(--t3);font-size:10px}
.c-row:last-child{margin-bottom:0}

.up-wrap{margin-top:12px}
.up-head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.up-head .ul{color:var(--t3)}
.up-head .uv{color:var(--t2);font-weight:600;font-family:'Orbitron',monospace;font-size:9px}
.up-track{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
.up-fill{height:100%;border-radius:2px;transition:width .6s ease}
.up-fill.hi{background:var(--on)}.up-fill.mi{background:var(--gn)}.up-fill.lo{background:var(--off)}

.ok-badge{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-size:11px;font-weight:600;background:var(--on-bg);color:var(--on)}
.ok-badge i{font-size:13px}

.no-res{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--t3)}
.no-res i{font-size:36px;margin-bottom:14px;display:block;opacity:.3}

.toast-c{position:fixed;top:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:11px;min-width:300px;max-width:380px;background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border:1px solid var(--border);animation:ti .35s ease;box-shadow:0 8px 28px rgba(0,0,0,.4)}
.toast-out{animation:to .25s ease forwards}
@keyframes ti{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes to{to{opacity:0;transform:translateX(30px)}}
.ts{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch}
.ts.success{background:var(--on)}.ts.warning{background:var(--gn)}.ts.danger{background:var(--off)}.ts.info{background:var(--ac)}
.ti-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.ti-icon.success{color:var(--on)}.ti-icon.warning{color:var(--gn)}.ti-icon.danger{color:var(--off)}.ti-icon.info{color:var(--ac)}
.t-body{flex:1}.t-title{font-size:12px;font-weight:700;margin-bottom:1px}.t-msg{font-size:11px;color:var(--t2)}
.t-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:0;flex-shrink:0}

.log-ov{position:fixed;inset:0;z-index:1500;background:rgba(6,10,19,.6);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:.3s}
.log-ov.open{opacity:1;visibility:visible}
.log-pn{position:fixed;top:0;right:0;bottom:0;z-index:1501;width:380px;max-width:90vw;background:rgba(13,19,33,.97);backdrop-filter:blur(16px);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.log-pn.open{transform:translateX(0)}
.log-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.log-hd h3{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:1px}
.log-bdg{background:var(--ac);color:#000;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:8px}
.log-ct{flex:1;overflow-y:auto;padding:14px 20px}
.log-e{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-tm{font-family:'Orbitron',monospace;font-size:9px;color:var(--t3);flex-shrink:0;padding-top:2px;min-width:60px}
.log-dt{flex:1}.log-sv{font-weight:600;font-size:12px;margin-bottom:1px}.log-ch{font-size:10px;color:var(--t2)}.log-ch .ar{color:var(--t3);margin:0 3px}
.log-empty{text-align:center;color:var(--t3);padding:35px 0;font-size:12px}.log-empty i{font-size:28px;display:block;margin-bottom:10px;opacity:.3}

footer{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:9px 24px;font-size:10px;color:var(--t3);background:rgba(6,10,19,.9);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
footer kbd{padding:1px 5px;border-radius:3px;font-size:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);font-family:'Outfit',sans-serif}

@media(max-width:768px){header{padding:12px 14px}.h-center{display:none}.stats-bar{padding:0 14px}.stat-item{min-width:70px;padding:10px 8px}.stat-num{font-size:18px}.toolbar{padding:10px 14px}.search-box{flex:1 1 100%}main{padding:14px 14px 70px}.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}footer{padding:7px 14px}.f-short{display:none}}
@media(max-width:480px){.grid{grid-template-columns:1fr}.vol-wrap{display:none}.audio-activate span{display:none}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-blob a"></div>
<div class="glow-blob b"></div>
<div class="scan-line"></div>

<!-- Visual alarm flash layer -->
<div id="alarmFlash" class="alarm-flash"></div>

<div id="toasts" class="toast-c"></div>

<div id="logOv" class="log-ov" onclick="toggleLog()"></div>
<aside id="logPn" class="log-pn">
  <div class="log-hd">
    <h3>LOG AKTIVITAS <span id="logBdg" class="log-bdg">0</span></h3>
    <button class="btn-icon" onclick="toggleLog()" aria-label="Tutup log"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div id="logCt" class="log-ct"><div class="log-empty"><i class="fa-solid fa-clock-rotate-left"></i><p>Belum ada aktivitas tercatat</p></div></div>
</aside>

<header id="mainHeader">
  <div class="h-left">
    <div class="logo"><i class="fa-solid fa-tower-broadcast"></i><h1>MONITOR PRO</h1></div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="h-center"><div id="clock"></div><div id="dateText"></div></div>
  <div class="h-right">
    <div class="health-wrap">
      <div class="health-label">Kesehatan</div>
      <svg width="46" height="46" viewBox="0 0 46 46">
        <circle cx="23" cy="23" r="18" fill="none" stroke="var(--border)" stroke-width="4"/>
        <circle id="hArc" cx="23" cy="23" r="18" fill="none" stroke="var(--on)" stroke-width="4" stroke-dasharray="113.1" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 23 23)" style="transition:stroke-dashoffset .8s,stroke .5s"/>
        <text id="hTxt" x="23" y="27" text-anchor="middle" fill="var(--t1)" font-size="10" font-weight="700">--</text>
      </svg>
    </div>
    <div class="audio-ctrl">
      <button class="btn-icon" id="muteBtn" onclick="toggleMute()" aria-label="Mute" title="Mute (M)"><i class="fa-solid fa-volume-xmark"></i></button>
      <div class="vol-wrap">
        <input type="range" min="0" max="100" value="100" id="volSl" oninput="setVol(this.value)">
        <span id="volTx">100</span>
      </div>
    </div>
  </div>
</header>

<section class="stats-bar">
  <div class="stat-item"><div class="stat-num c-ac" id="sTotal">0</div><div class="stat-lbl">Total Layanan</div></div>
  <div class="stat-item"><div class="stat-num c-on" id="sOn">0</div><div class="stat-lbl">Online</div></div>
  <div class="stat-item"><div class="stat-num c-gn" id="sGn">0</div><div class="stat-lbl">Gangguan</div></div>
  <div class="stat-item"><div class="stat-num c-off" id="sOff">0</div><div class="stat-lbl">Offline</div></div>
</section>

<section class="toolbar">
  <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchIn" placeholder="Cari layanan..." oninput="applyFilter()"></div>
  <div class="pills">
    <button class="pill a" onclick="setFilter('semua',this)">Semua</button>
    <button class="pill" onclick="setFilter('online',this)">Online</button>
    <button class="pill" onclick="setFilter('gangguan',this)">Gangguan</button>
    <button class="pill" onclick="setFilter('offline',this)">Offline</button>
  </div>
  <div class="tb-right">
    <!-- TOMBOL AKTIFASI AUDIO -->
    <button class="audio-activate" id="audioBtn" onclick="initAudio()">
      <i class="fa-solid fa-bell"></i>
      <span>Aktifkan Alarm</span>
    </button>
    <select class="sort-sel" id="sortSel" onchange="applySort()">
      <option value="nama">Urut: Nama</option>
      <option value="status">Urut: Status</option>
      <option value="urgensi">Urut: Urgensi</option>
    </select>
    <button class="btn-icon" onclick="toggleLog()" title="Log Aktivitas"><i class="fa-solid fa-clock-rotate-left"></i></button>
  </div>
</section>

<main><div id="grid" class="grid"></div></main>

<footer>
  <span>Monitor PRO v2.0 &mdash; Sistem Monitoring Real-Time</span>
  <div class="f-short"><kbd>M</kbd> Mute &nbsp;<kbd>L</kbd> Log &nbsp;<kbd>Esc</kbd> Tutup</div>
</footer>

<script>
/* ===== DATA ===== */
var services = [
  {name:"BCA",start:"21:54",end:"00:07",type:"offline",cat:"Bank"},
  {name:"MANDIRI",start:"22:55",end:"02:55",type:"offline",cat:"Bank"},
  {name:"BNI",start:"22:58",end:"02:30",type:"gangguan",cat:"Bank"},
  {name:"BRI",start:"23:15",end:"04:30",type:"gangguan",cat:"Bank"},
  {name:"DANA",start:"23:29",end:"00:00",type:"gangguan",cat:"E-Wallet"},
  {name:"QRIS",start:"23:47",end:"23:59",type:"gangguan",cat:"Payment"}
];

/* ===== AUDIO ===== */
var audioOn = false, muted = false, vol = parseFloat(localStorage.getItem("vol"))||1, actx;
document.getElementById("volSl").value = Math.round(vol*100);
document.getElementById("volTx").textContent = Math.round(vol*100);

function ensureCtx(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended") actx.resume();
  return actx;
}

function initAudio(){
  if(audioOn) return;
  audioOn = true;
  try{ ensureCtx(); } catch(e){}
  speechSynthesis.getVoices();

  // Update tampilan tombol
  var btn = document.getElementById("audioBtn");
  btn.classList.add("active");
  btn.innerHTML = '<i class="fa-solid fa-bell"></i><span>Alarm Aktif</span>';

  // Update ikon mute
  document.getElementById("muteBtn").innerHTML = '<i class="fa-solid fa-volume-high"></i>';

  // Suara konfirmasi + suara
  playTone(800,.1);
  setTimeout(function(){ playTone(1000,.1); },120);
  setTimeout(function(){ playTone(1200,.15); },240);
  setTimeout(function(){ say("Monitor aktif, "+services.length+" layanan terpantau"); },500);

  toast("Alarm berhasil diaktifkan","success","Audio");
}

function say(t){
  if(!audioOn||muted) return;
  speechSynthesis.cancel();
  var m = new SpeechSynthesisUtterance(t);
  m.lang = "id-ID";
  m.volume = vol;
  m.rate = 1.1;
  speechSynthesis.speak(m);
}

/* Tone dasar */
function playTone(freq, dur, type){
  if(!audioOn||muted) return;
  try{
    var ctx = ensureCtx();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = type || "sine";
    o.frequency.value = freq || 1000;
    g.gain.value = vol * 0.4;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + (dur||.2));
  } catch(e){}
}

/* ===== ALARM OFFLINE - SIREN DARURAT ===== */
function alarmOffline(name){
  // Siren naik-turun 3x
  for(var r = 0; r < 3; r++){
    (function(rNum){
      setTimeout(function(){
        if(!audioOn||muted) return;
        try{
          var ctx = ensureCtx();
          var o = ctx.createOscillator();
          var g = ctx.createGain();
          o.type = "sawtooth";
          g.gain.value = vol * 0.25;
          // Naik dari 400 ke 1100
          o.frequency.setValueAtTime(400, ctx.currentTime);
          o.frequency.linearRampToValueAtTime(1100, ctx.currentTime + 0.18);
          // Turun dari 1100 ke 400
          o.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.36);
          o.connect(g); g.connect(ctx.destination);
          o.start(); o.stop(ctx.currentTime + 0.36);
        } catch(e){}
      }, rNum * 450);
    })(r);
  }
  // Suara setelah siren
  setTimeout(function(){ say(name + " sedang offline"); }, 1500);
}

/* ===== ALARM GANGGUAN - BEEP PERINGATAN ===== */
function alarmGangguan(name){
  // 4 beep pendek ascending
  var freqs = [500, 600, 700, 600];
  for(var i = 0; i < freqs.length; i++){
    (function(f, d){
      setTimeout(function(){ playTone(f, 0.12); }, d);
    })(freqs[i], i * 180);
  }
  setTimeout(function(){ say(name + " sedang gangguan"); }, 900);
}

/* ===== ALARM PULIH - CHIME POSITIF ===== */
function alarmRecovered(name){
  // 3 nada naik harmonis
  var freqs = [660, 880, 1100];
  for(var i = 0; i < freqs.length; i++){
    (function(f, d){
      setTimeout(function(){ playTone(f, 0.25, "sine"); }, d);
    })(freqs[i], i * 200);
  }
  setTimeout(function(){ say(name + " sudah normal kembali"); }, 800);
}

function toggleMute(){
  if(!audioOn){
    initAudio();
    return;
  }
  muted = !muted;
  document.getElementById("muteBtn").innerHTML = muted
    ? '<i class="fa-solid fa-volume-xmark"></i>'
    : '<i class="fa-solid fa-volume-high"></i>';
  toast(muted?"Alarm dimatikan sementara":"Alarm diaktifkan kembali","info","Audio");
}

function setVol(v){vol=v/100;document.getElementById("volTx").textContent=v;localStorage.setItem("vol",vol)}

/* ===== VISUAL ALARM ===== */
function flashScreen(type){
  var el = document.getElementById("alarmFlash");
  el.className = "alarm-flash";
  void el.offsetWidth;
  el.classList.add(type); // "red", "amber", "green"
  setTimeout(function(){ el.className = "alarm-flash"; }, 2000);
}

function flashHeader(type){
  var hd = document.getElementById("mainHeader");
  hd.classList.remove("alarm-border","warn-border","ok-border");
  void hd.offsetWidth;
  hd.classList.add(type);
  setTimeout(function(){ hd.classList.remove(type); }, 3000);
}

/* ===== UTILITAS ===== */
var RC = 2*Math.PI*26;

function toMin(t){var p=t.split(":");return p[0]*60+(+p[1])}
function pad(n){return n<10?"0"+n:""+n}

function getStatus(s){
  var now=new Date(),cur=now.getHours()*60+now.getMinutes();
  var st=toMin(s.start),en=toMin(s.end),inW;
  if(st<=en)inW=cur>=st&&cur<=en;else inW=cur>=st||cur<=en;
  return inW?(s.type==="offline"?"OFFLINE":"GANGGUAN"):"ONLINE"
}

function getCD(end){
  var now=new Date(),p=end.split(":"),tgt=new Date();
  tgt.setHours(+p[0],+p[1],0,0);
  if(tgt<=now)tgt.setDate(tgt.getDate()+1);
  var d=tgt-now,h=Math.floor(d/36e5),m=Math.floor(d%36e5/6e4),sc=Math.floor(d%6e4/1e3);
  return pad(h)+":"+pad(m)+":"+pad(sc)
}

function getCDsec(end){
  var now=new Date(),p=end.split(":"),tgt=new Date();
  tgt.setHours(+p[0],+p[1],0,0);
  if(tgt<=now)tgt.setDate(tgt.getDate()+1);
  return Math.max(0,(tgt-now)/1000)
}

function getProgress(s){
  var now=new Date(),cur=now.getHours()*60+now.getMinutes();
  var st=toMin(s.start),en=toMin(s.end),total,elapsed;
  if(st<=en){total=en-st;elapsed=cur-st}else{total=(1440-st)+en;elapsed=cur>=st?cur-st:(1440-st)+cur}
  return total===0?1:Math.min(1,Math.max(0,elapsed/total))
}

function getDur(s){var st=toMin(s.start),en=toMin(s.end);return st<=en?en-st:(1440-st)+en}
function calcUptime(s){return((1440-getDur(s))/1440*100).toFixed(1)}

/* ===== STATUS TRACKING ===== */
var lastSt={},logs=[],logOpen=false,curFilter="semua";

function addLog(n,f,t){
  logs.unshift({time:new Date().toLocaleTimeString("id-ID"),name:n,from:f,to:t});
  if(logs.length>100)logs.pop();
  renderLog()
}

function renderLog(){
  var c=document.getElementById("logCt"),b=document.getElementById("logBdg");
  b.textContent=logs.length;
  if(!logs.length){c.innerHTML='<div class="log-empty"><i class="fa-solid fa-clock-rotate-left"></i><p>Belum ada aktivitas</p></div>';return}
  var h="";
  for(var i=0;i<logs.length;i++){
    var e=logs[i];
    h+='<div class="log-e"><div class="log-tm">'+e.time+'</div><div class="log-dt"><div class="log-sv">'+e.name+'</div><div class="log-ch"><span style="color:var(--'+e.from.toLowerCase()+')">'+e.from+'</span><span class="ar"><i class="fa-solid fa-arrow-right"></i></span><span style="color:var(--'+e.to.toLowerCase()+')">'+e.to+'</span></div></div></div>'
  }
  c.innerHTML=h
}

/* ===== TOAST ===== */
function toast(msg,type,title){
  var c=document.getElementById("toasts");
  var icons={success:"fa-circle-check",warning:"fa-triangle-exclamation",danger:"fa-circle-xmark",info:"fa-circle-info"};
  var d=document.createElement("div");d.className="toast";
  d.innerHTML='<div class="ts '+type+'"></div><i class="fa-solid '+(icons[type]||icons.info)+' ti-icon '+type+'"></i><div class="t-body"><div class="t-title">'+(title||"")+'</div><div class="t-msg">'+msg+'</div></div><button class="t-close" onclick="this.parentElement.classList.add(\'toast-out\');setTimeout(function(){this.remove()}.bind(this.parentElement),250)"><i class="fa-solid fa-xmark"></i></button>';
  c.appendChild(d);
  setTimeout(function(){if(d.parentElement){d.classList.add("toast-out");setTimeout(function(){d.remove()},250)}},5000)
}

/* ===== CARD HTML ===== */
function cardHTML(s,status){
  var cls=status.toLowerCase();
  var up=calcUptime(s),uc=up>=95?"hi":up>=80?"mi":"lo";
  var body;
  if(status==="ONLINE"){
    body='<div class="c-body"><div class="ok-badge"><i class="fa-solid fa-shield-halved"></i> Layanan Aktif</div></div>'
  }else{
    var prog=getProgress(s),off=RC*(1-prog);
    var col=cls==="offline"?"var(--off)":"var(--gn)";
    var cd=getCD(s.end);
    var dur=getDur(s),dh=Math.floor(dur/60),dm=dur%60,ds=dh>0?dh+"j "+dm+"m":dm+"m";
    var ico=status==="OFFLINE"?"circle-xmark":"circle-exclamation";
    var lbl=status==="OFFLINE"?"Maintenance":"Gangguan";
    body='<div class="c-body"><div class="cd-ring"><svg width="62" height="62" viewBox="0 0 62 62"><circle cx="31" cy="31" r="26" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle id="ring-'+s.name+'" cx="31" cy="31" r="26" fill="none" stroke="'+col+'" stroke-width="4" stroke-dasharray="'+RC+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 31 31)" style="transition:stroke-dashoffset 1s linear"/></svg><div class="rt" id="cd-'+s.name+'">'+cd+'</div></div><div class="c-info"><div class="c-row"><i class="fa-solid fa-clock"></i> Durasi: '+ds+'</div><div class="c-row"><i class="fa-solid fa-calendar"></i> '+s.start+' - '+s.end+'</div><div class="c-row"><i class="fa-solid fa-'+ico+'"></i> '+lbl+'</div></div></div>'
  }
  return '<div class="card s-'+cls+'" id="c-'+s.name+'" data-status="'+status+'" data-name="'+s.name+'" data-cat="'+s.cat+'"><div class="c-top"><div class="c-name">'+s.name+'</div><div class="c-cat">'+s.cat+'</div></div><div class="c-status"><div class="s-dot '+cls+'"></div><span class="s-txt '+cls+'">'+status+'</span></div>'+body+'<div class="up-wrap"><div class="up-head"><span class="ul">Uptime Harian</span><span class="uv">'+up+'%</span></div><div class="up-track"><div class="up-fill '+uc+'" style="width:'+up+'%"></div></div></div></div>'
}

/* ===== FILTER & SORT ===== */
function setFilter(f,el){
  curFilter=f;
  var pills=document.querySelectorAll(".pill");
  for(var i=0;i<pills.length;i++)pills[i].className="pill";
  if(f==="semua")el.classList.add("a");
  else if(f==="online")el.classList.add("a");
  else if(f==="gangguan")el.classList.add("a-gn");
  else if(f==="offline")el.classList.add("a-off");
  applyFilter()
}

function applyFilter(){
  var search=document.getElementById("searchIn").value.toLowerCase().trim();
  var cards=document.querySelectorAll(".card");
  for(var i=0;i<cards.length;i++){
    var n=cards[i].getAttribute("data-name").toLowerCase();
    var c=cards[i].getAttribute("data-cat").toLowerCase();
    var st=cards[i].getAttribute("data-status").toLowerCase();
    var ms=!search||n.indexOf(search)>=0||c.indexOf(search)>=0;
    var mf=curFilter==="semua"||st===curFilter;
    cards[i].classList.toggle("hidden-card",!(ms&&mf))
  }
}

function applySort(){
  var sort=document.getElementById("sortSel").value;
  var arr=[];for(var i=0;i<services.length;i++)arr.push(services[i]);
  if(sort==="nama")arr.sort(function(a,b){return a.name.localeCompare(b.name)});
  else if(sort==="status"){var ord={ONLINE:0,GANGGUAN:1,OFFLINE:2};arr.sort(function(a,b){return ord[getStatus(a)]-ord[getStatus(b)]})}
  else if(sort==="urgensi"){arr.sort(function(a,b){var sa=getStatus(a),sb=getStatus(b);if(sa==="ONLINE"&&sb!=="ONLINE")return 1;if(sa!=="ONLINE"&&sb==="ONLINE")return -1;if(sa==="ONLINE")return 0;return getCDsec(a.end)-getCDsec(b.end)})}
  var html="";for(var i=0;i<arr.length;i++)html+=cardHTML(arr[i],getStatus(arr[i]));
  document.getElementById("grid").innerHTML=html;
  lastSt={};for(var i=0;i<services.length;i++)lastSt[services[i].name]=getStatus(services[i]);
  updateStats();applyFilter()
}

/* ===== STATS ===== */
function updateStats(){
  var c={ONLINE:0,GANGGUAN:0,OFFLINE:0};
  for(var i=0;i<services.length;i++)c[getStatus(services[i])]++;
  animN("sTotal",services.length);
  animN("sOn",c.ONLINE);animN("sGn",c.GANGGUAN);animN("sOff",c.OFFLINE);
  var pct=services.length>0?Math.round(c.ONLINE/services.length*100):0;
  var circ=2*Math.PI*18;
  document.getElementById("hArc").style.strokeDashoffset=circ*(1-pct/100);
  var arc=document.getElementById("hArc");
  arc.setAttribute("stroke",pct>=80?"var(--on)":pct>=50?"var(--gn)":"var(--off)");
  document.getElementById("hTxt").textContent=pct+"%"
}

function animN(id,v){
  var el=document.getElementById(id);
  if(el.textContent!==""+v){el.textContent=v;el.classList.remove("pop");void el.offsetWidth;el.classList.add("pop")}
}

/* ===== LOG PANEL ===== */
function toggleLog(){
  logOpen=!logOpen;
  document.getElementById("logPn").classList.toggle("open",logOpen);
  document.getElementById("logOv").classList.toggle("open",logOpen)
}

/* ===== KEYBOARD ===== */
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
  if(e.key==="m"||e.key==="M"){e.preventDefault();toggleMute()}
  else if(e.key==="l"||e.key==="L"){e.preventDefault();toggleLog()}
  else if(e.key==="Escape"&&logOpen)toggleLog()
});

/* ===== JAM ===== */
function updateClock(){
  var now=new Date();
  document.getElementById("clock").textContent=now.toLocaleTimeString("id-ID",{hour12:false});
  document.getElementById("dateText").textContent=now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"})
}

/* ===== INIT ===== */
function init(){
  updateClock();
  var html="";
  for(var i=0;i<services.length;i++){
    var s=services[i],st=getStatus(s);
    html+=cardHTML(s,st);
    lastSt[s.name]=st;
  }
  document.getElementById("grid").innerHTML=html;
  updateStats()
}

/* ===== TICK ===== */
function tick(){
  updateClock();
  for(var i=0;i<services.length;i++){
    var s=services[i];
    var newSt=getStatus(s);
    var card=document.getElementById("c-"+s.name);
    if(!card)continue;
    var oldSt=card.getAttribute("data-status");

    if(oldSt!==newSt){
      // Rebuild card
      var tmp=document.createElement("div");
      tmp.innerHTML=cardHTML(s,newSt);
      var newCard=tmp.firstElementChild;
      newCard.classList.remove("flash-on","flash-gn","flash-off");
      void newCard.offsetWidth;
      newCard.classList.add("flash-"+newSt.toLowerCase());
      card.parentNode.replaceChild(newCard,card);
      lastSt[s.name]=newSt;

      // Toast (selalu muncul)
      var tt={ONLINE:"success",GANGGUAN:"warning",OFFLINE:"danger"};
      var tm={ONLINE:"Layanan kembali normal",GANGGUAN:"Terjadi gangguan pada layanan",OFFLINE:"Layanan sedang tidak tersedia"};
      toast(tm[newSt],tt[newSt],s.name);

      // Visual alarm (selalu muncul)
      if(newSt==="OFFLINE"){
        flashScreen("red");
        flashHeader("alarm-border");
      } else if(newSt==="GANGGUAN"){
        flashScreen("amber");
        flashHeader("warn-border");
      } else {
        flashScreen("green");
        flashHeader("ok-border");
      }

      // Suara alarm (hanya jika audio aktif & tidak muted)
      if(audioOn && !muted){
        if(newSt==="OFFLINE") alarmOffline(s.name);
        else if(newSt==="GANGGUAN") alarmGangguan(s.name);
        else alarmRecovered(s.name);
      }

      // Log
      addLog(s.name,oldSt,newSt);

      applyFilter();
    } else if(newSt!=="ONLINE"){
      // Update countdown saja
      var cdEl=document.getElementById("cd-"+s.name);
      if(cdEl)cdEl.textContent=getCD(s.end);
      var ringEl=document.getElementById("ring-"+s.name);
      if(ringEl){
        var prog=getProgress(s);
        ringEl.setAttribute("stroke-dashoffset",RC*(1-prog))
      }
    }
  }
  updateStats()
}

init();
setInterval(tick,1000);
</script>
</body>
